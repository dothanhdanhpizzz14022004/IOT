; PlatformIO Project Configuration File
;
; Multi-env layout:
;   env:task1 — Task 1: temperature-driven LED blink (FreeRTOS queue + semaphore)
;   env:task3 — Task 3: LCD temp/humi monitor with state classification (I2C mutex)
;   env:task6 — Task 6 / Lab 4: full RTOS stack (LED, NeoPixel, DHT, TinyML, webserver, CoreIOT bridge)
;
; Tasks 2, 4, 5 live inside the task6 unified build. Use the Makefile for one-liners.

[env]
platform = espressif32
board = yolo_uno
framework = arduino
monitor_speed = 115200
lib_compat_mode = strict

[env:task1]
build_src_filter = -<*> +<task1/>
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    DHT20

[env:task3]
build_src_filter = -<*> +<task3/>
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    DHT20
    LCD

[env:task6]
board_build.filesystem = littlefs
build_src_filter = +<*> -<task1/> -<task3/>
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -DSSID_AP='"ESP32 LOCAL"'
    -DPASS_AP='12345678'
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
lib_deps =
    tanakamasayuki/TensorFlowLite_ESP32@1.0.0
    adafruit/Adafruit NeoPixel@^1.15.1
    DHT20
    LCD
    PubSubClient
    https://github.com/me-no-dev/ESPAsyncWebServer.git
